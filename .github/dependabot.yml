version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    allow:
      - dependency-type: "direct"
    open-pull-requests-limit: 100
    versioning-strategy: "increase"
    rebase-strategy: "disabled"
    groups:
      dev-dependencies:
        patterns:
          - "@stylistic/eslint-plugin"
          - "@symfony/webpack-encore"
          - "eslint"
          - "file-loader"
          - "globals"
          - "sass"
          - "sass-loader"
          - "webpack"
          - "webpack-cli"
      tabler:
        patterns:
          - "@tabler/*"

  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "monthly"
    allow:
      - dependency-type: "direct"
    open-pull-requests-limit: 100
    versioning-strategy: "increase"
    rebase-strategy: "disabled"
    ignore:
      - dependency-name: "symfony/*"
        versions:
          - ">= 8.0"
    groups:
      dev-dependencies:
        dependency-type: "development"
      doctrine:
        dependency-type: "production"
        patterns:
          - "doctrine/*"
      symfony:
        dependency-type: "production"
        patterns:
          - "symfony/*"
      twig:
        dependency-type: "production"
        patterns:
          - "twig/*"
